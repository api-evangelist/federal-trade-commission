apis:
  - aid: federal-trade-commission:developer-portal
    name: FTC Developer Portal
    description: >-
      The FTC Developer Portal is the central hub for developer documentation,
      data dictionaries, and access program details for FTC-managed datasets
      and services.
    humanURL: https://www.ftc.gov/developer
    baseURL: https://api.ftc.gov
    tags:
      - Federal Government
      - Documentation
    properties:
      - type: Documentation
        url: https://www.ftc.gov/developer
      - type: Website
        url: https://www.ftc.gov/
  - aid: federal-trade-commission:do-not-call-registry
    name: National Do Not Call Registry
    description: >-
      The National Do Not Call Registry program lets telemarketers and
      sellers download phone-number data they must scrub against before
      placing calls. Access is provisioned through telemarketer.donotcall.gov
      and governed by the Telemarketing Sales Rule.
    humanURL: https://telemarketers.donotcall.gov
    tags:
      - Do Not Call
      - Consumer Protection
      - Telemarketing
    properties:
      - type: Documentation
        url: https://telemarketers.donotcall.gov
      - type: Consumer Site
        url: https://www.donotcall.gov
  - aid: federal-trade-commission:consumer-sentinel
    name: Consumer Sentinel Network
    description: >-
      Consumer Sentinel is the FTC's secure online database of consumer
      reports of fraud, identity theft, and other complaints, made available
      to participating federal, state, local, and international law
      enforcement agencies through a vetted access program.
    humanURL: https://www.ftc.gov/enforcement/consumer-sentinel-network
    tags:
      - Consumer Protection
      - Law Enforcement
      - Fraud
    properties:
      - type: Documentation
        url: https://www.ftc.gov/enforcement/consumer-sentinel-network
      - type: Data Book
        url: https://www.ftc.gov/enforcement/consumer-sentinel-network/reports
  - aid: federal-trade-commission:hsr-premerger
    name: HSR Premerger Notification
    description: >-
      The Hart-Scott-Rodino (HSR) Premerger Notification Program coordinates
      premerger filings reviewed by the FTC and DOJ. Filings are submitted
      electronically through the dedicated HSR e-filing system.
    humanURL: https://www.ftc.gov/enforcement/premerger-notification-program
    tags:
      - Antitrust
      - Mergers
    properties:
      - type: Documentation
        url: https://www.ftc.gov/enforcement/premerger-notification-program
      - type: E-Filing
        url: https://www.hsr.gov
