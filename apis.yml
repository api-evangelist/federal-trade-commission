aid: federal-trade-commission
name: Federal Trade Commission
description: >-
  The Federal Trade Commission (FTC) is a U.S. federal agency that enforces
  antitrust and consumer protection laws affecting virtually every area of
  commerce. The FTC publishes developer-facing data products and APIs through
  ftc.gov/developer and partner platforms, including the National Do Not Call
  Registry telemarketer access program and the Consumer Sentinel Network of
  consumer complaint data shared with law enforcement.
